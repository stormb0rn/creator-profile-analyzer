<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pika Creator Review v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; }
.toolbar { position: sticky; top: 0; z-index: 100; background: #1a1a1a; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border: 1px solid #333; }
.toolbar input, .toolbar select { padding: 7px 12px; border-radius: 8px; border: 1px solid #555; background: #2a2a2a; color: #fff; font-size: 13px; }
.toolbar .search { width: 200px; }
.toolbar button { padding: 7px 14px; border-radius: 8px; border: 1px solid #555; background: #2a2a2a; color: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.toolbar button:hover { background: #3a3a3a; }
.toolbar button.primary { background: #0066ff; border-color: #0066ff; }
.toolbar button.active { background: #0066ff; border-color: #0066ff; }
.toolbar .count { font-size: 13px; color: #888; white-space: nowrap; }
.toolbar .saving { color: #f0c040; font-size: 12px; }

/* View toggle */
.view-toggle { display: flex; gap: 0; }
.view-toggle button { border-radius: 0; border-right: none; }
.view-toggle button:first-child { border-radius: 8px 0 0 8px; }
.view-toggle button:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid #555; }

/* Table view */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { position: sticky; top: 56px; background: #1a1a1a; padding: 8px 10px; text-align: left; border-bottom: 2px solid #333; white-space: nowrap; cursor: pointer; user-select: none; z-index: 50; }
th:hover { color: #1d9bf0; }
td { padding: 7px 10px; border-bottom: 1px solid #222; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr.data-row { cursor: pointer; }
tr.data-row:hover { background: #1a1a1a; }
tr.picked-row { background: rgba(0,168,84,0.1); }
tr.picked-row td:first-child { border-left: 3px solid #00a854; }
td a { color: #1d9bf0; text-decoration: none; }
td a:hover { text-decoration: underline; }
td input[type=checkbox] { width: 18px; height: 18px; accent-color: #00a854; cursor: pointer; }
.badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.badge-community { background: #1a3a5c; color: #5ba3e6; }
.badge-paid { background: #3a2a1a; color: #e6a85b; }
.badge-wait { background: #2a2a2a; color: #888; }
.badge-skip { background: #3a1a1a; color: #e65b5b; }
.badge-meets { background: #1a3a1a; color: #5be65b; }
.badge-not-meets { background: #3a1a1a; color: #e65b5b; }
/* Category color badges */
.cat-tech { background: #1a2a3a; color: #5b9ee6; }
.cat-dev { background: #1a3a2a; color: #5be6a8; }
.cat-crypto { background: #3a3a1a; color: #e6d45b; }
.cat-founder { background: #2a1a3a; color: #b05be6; }
.cat-video { background: #3a1a2a; color: #e65b9e; }
.cat-cjk { background: #1a3a3a; color: #5be6e6; }
.cat-educator { background: #2a3a1a; color: #a8e65b; }
.cat-news { background: #2a2a3a; color: #8888e6; }
.cat-lifestyle { background: #3a2a2a; color: #e6a88a; }
.cat-inactive { background: #2a2a2a; color: #666; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.loading { text-align: center; padding: 60px; color: #888; font-size: 18px; }

/* Expand row for tweet embed */
tr.expand-row { background: #111; }
tr.expand-row td { padding: 16px; max-width: none; white-space: normal; overflow: visible; }
.embed-container { display: flex; gap: 20px; align-items: flex-start; }
.embed-left { flex: 1; min-width: 300px; }
.embed-right { flex: 0 0 auto; }
.embed-left .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
.embed-left .info-grid dt { color: #888; }
.embed-left .info-grid dd { color: #e0e0e0; }

/* Card/Grid view */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(550px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; border: 2px solid #333; overflow: hidden; transition: all 0.3s; }
.card.picked { border-color: #00a854; box-shadow: 0 0 12px rgba(0,168,84,0.3); }
.card.focused { border-color: #1d9bf0; box-shadow: 0 0 12px rgba(29,155,240,0.3); }
.card.removing { opacity: 0; transform: scale(0.95); pointer-events: none; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; }
.card-header .card-info { display: flex; align-items: center; gap: 8px; font-weight: 600; }
.handle-link { color: #1d9bf0; text-decoration: none; }
.handle-link:hover { text-decoration: underline; }
.meta { display: flex; gap: 8px; font-size: 12px; flex-wrap: wrap; }
.meta span { background: #2a2a2a; padding: 2px 8px; border-radius: 4px; }
.meta .picked-badge { background: #00a854; color: #fff; }
.tweet-embed { padding: 8px 16px 16px; min-height: 150px; }
.card-footer { padding: 10px 16px; border-top: 1px solid #222; font-size: 13px; display: flex; justify-content: space-between; }
.stats { display: flex; gap: 16px; }
.stats span { color: #aaa; }
.no-post { color: #666; padding: 20px; text-align: center; }
.pick-btn { padding: 5px 14px; border-radius: 8px; border: 1px solid #00a854; background: transparent; color: #00a854; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; }
.pick-btn:hover { background: #00a854; color: #fff; }
.pick-btn.active { background: #00a854; color: #fff; }
.reject-btn { padding: 5px 14px; border-radius: 8px; border: 1px solid #444; background: transparent; color: #888; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; }
.reject-btn:hover { background: #3a1a1a; border-color: #e65b5b; color: #e65b5b; }
.card-actions-top { display: flex; gap: 8px; padding: 10px 16px; justify-content: flex-end; border-bottom: 1px solid #222; }
.kbd-hint { position: fixed; bottom: 16px; right: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #666; z-index: 100; line-height: 1.8; }
.kbd-hint kbd { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 1px 6px; font-family: monospace; color: #aaa; }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 20px; color: #aaa; font-size: 14px; }
.pagination button { padding: 8px 18px; border-radius: 8px; border: 1px solid #555; background: #2a2a2a; color: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.pagination button:hover:not(:disabled) { background: #3a3a3a; }
.pagination button:disabled { opacity: 0.3; cursor: default; }

/* Modal */
.export-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
.export-modal.show { display: flex; }
.export-content { background: #1a1a1a; border-radius: 12px; padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid #333; }
.export-content textarea { width: 100%; height: 300px; background: #0a0a0a; color: #e0e0e0; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; margin: 12px 0; resize: vertical; }
.export-content .btn-row { display: flex; gap: 8px; margin-top: 8px; }

/* Batch browse modal */
.batch-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 300; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
.batch-modal.show { display: flex; }
.batch-content { background: #1a1a1a; border-radius: 12px; padding: 24px; max-width: 900px; width: 100%; border: 1px solid #333; }
.batch-content h3 { margin-bottom: 12px; }
.batch-input-area { display: flex; gap: 8px; margin-bottom: 16px; }
.batch-input-area textarea { flex: 1; height: 80px; background: #0a0a0a; color: #e0e0e0; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; resize: vertical; }
.batch-tweets { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; max-height: 70vh; overflow-y: auto; padding: 4px; }
.batch-tweet-card { background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; min-height: 150px; }
.batch-count { color: #888; font-size: 13px; margin-bottom: 12px; }

/* Community tab */
.community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 16px; padding: 4px; }
.community-card { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
.community-card-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; }
.community-card-header .info { display: flex; align-items: center; gap: 8px; }
.community-card-header .info a { color: #1d9bf0; text-decoration: none; font-weight: 600; }
.community-card-header .info a:hover { text-decoration: underline; }
.community-card-header .stats { display: flex; gap: 10px; font-size: 12px; color: #888; }
.community-card-header .stats span { background: #2a2a2a; padding: 2px 8px; border-radius: 4px; }
.community-card .tweet-embed { padding: 8px 16px 16px; min-height: 150px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="view-toggle">
    <button id="btnTable" onclick="setView('table')">📊 Table</button>
    <button id="btnCards" class="active" onclick="setView('cards')">🃏 Cards</button>
    <button id="btnCommunity" onclick="setView('community')">🌟 Community</button>
    <button id="btnInfluencer" onclick="setView('influencer')">🎯 Influencer</button>
  </div>
  <input type="text" class="search" placeholder="🔍 Search handle/name/bio..." oninput="applyFilters()">
  <select id="fCommunity" onchange="applyFilters()"><option value="">Community/Paid</option></select>
  <select id="fCategory" onchange="applyFilters()"><option value="">Category</option></select>
  <select id="fSelection" onchange="applyFilters()"><option value="">Selection Status</option></select>
  <select id="fTier" onchange="applyFilters()"><option value="">Tier (CPM)</option></select>
  <select id="fReco" onchange="applyFilters()"><option value="">Recommendation</option></select>
  <select id="fPicked" onchange="applyFilters()">
    <option value="">Picked</option>
    <option value="yes">✅ Picked</option>
    <option value="no">Not Picked</option>
  </select>
  <button onclick="openBatchBrowse()">📌 Batch Browse</button>
  <button class="primary" onclick="exportPicked()">📋 Export</button>
  <span class="count" id="counter">Loading...</span>
  <span class="saving" id="saveStatus"></span>
</div>

<div id="tableView" class="table-wrap" style="display:none">
  <table id="mainTable">
    <thead><tr id="headerRow"></tr></thead>
    <tbody id="tbody"><tr><td colspan="20" class="loading">Loading creators from Google Sheets...</td></tr></tbody>
  </table>
</div>

<div id="cardView" class="grid">
  <div class="loading">Loading...</div>
</div>

<div id="communityView" class="community-grid" style="display:none">
  <div class="loading">Loading community creators...</div>
</div>

<div id="influencerView" class="community-grid" style="display:none">
  <div class="loading">Loading influencers...</div>
</div>

<div class="kbd-hint" id="kbdHint" style="display:none">
  <kbd>←</kbd><kbd>→</kbd> Navigate &nbsp; <kbd>P</kbd> Pick &nbsp; <kbd>R</kbd> Reject
</div>

<div class="export-modal" id="exportModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="export-content">
    <h3>📋 Export Picked Creators</h3>
    <p id="exportCount"></p>
    <textarea id="exportText" readonly></textarea>
    <div class="btn-row">
      <button class="primary" onclick="copyExport(this)">Copy to Clipboard</button>
      <button onclick="downloadCSV()">Download CSV</button>
      <button onclick="document.getElementById('exportModal').classList.remove('show')">Close</button>
    </div>
  </div>
</div>

<div class="batch-modal" id="batchModal" onclick="if(event.target===this)closeBatchBrowse()">
  <div class="batch-content">
    <h3>📌 Batch Browse Tweets</h3>
    <div class="batch-input-area">
      <textarea id="batchInput" placeholder="Paste tweet URLs here, one per line...&#10;https://x.com/user/status/123&#10;https://twitter.com/user/status/456"></textarea>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="primary" onclick="renderBatchTweets()">Load</button>
        <button onclick="clearBatchTweets()">Clear</button>
        <button onclick="closeBatchBrowse()">Close</button>
      </div>
    </div>
    <div class="batch-count" id="batchCount"></div>
    <div class="batch-tweets" id="batchTweets"></div>
  </div>
</div>

<script>
var API = '/api/creators';
var allCreators = [];
var filtered = [];
var sortCol = '';
var sortAsc = true;
var currentView = 'cards';
var expandedIdx = -1;
var currentPage = 0;
var PAGE_SIZE = 100;
var focusedCardIdx = -1;

var COLUMNS = [
  { key: 'picked', label: '✅', type: 'check', w: 40 },
  { key: 'handle', label: 'Handle', type: 'link' },
  { key: 'name', label: 'Name' },
  { key: 'community_paid', label: 'Type', type: 'badge' },
  { key: 'category', label: 'Category' },
  { key: 'selection_status', label: 'Selection', type: 'badge2' },
  { key: 'tier', label: 'Tier' },
  { key: 'recommendation', label: 'Reco' },
  { key: 'ex1_views', label: 'Views', type: 'num' },
  { key: 'ex1_likes', label: 'Likes', type: 'num' },
  { key: 'median_views', label: 'Med Views', type: 'num' },
  { key: 'median_likes', label: 'Med Likes', type: 'num' },
  { key: 'est_cpm', label: 'CPM' },
  { key: 'max_pay', label: 'Max Pay' },
  { key: 'top_post_likes', label: '🔥 Top', type: 'num' },
  { key: 'bio', label: 'Bio' },
];

function getTweetId(url) {
  if (!url) return null;
  var m = url.match(/status\/(\d+)/);
  return m ? m[1] : null;
}

function parseNum(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/[$,]/g, '')) || 0;
}

function showSaving(msg) {
  document.getElementById('saveStatus').textContent = msg;
  if (msg) setTimeout(function() { document.getElementById('saveStatus').textContent = ''; }, 2000);
}

function setView(v) {
  currentView = v;
  document.getElementById('btnTable').classList.toggle('active', v === 'table');
  document.getElementById('btnCards').classList.toggle('active', v === 'cards');
  document.getElementById('btnCommunity').classList.toggle('active', v === 'community');
  document.getElementById('btnInfluencer').classList.toggle('active', v === 'influencer');
  document.getElementById('tableView').style.display = v === 'table' ? '' : 'none';
  document.getElementById('cardView').style.display = v === 'cards' ? '' : 'none';
  document.getElementById('communityView').style.display = v === 'community' ? '' : 'none';
  document.getElementById('influencerView').style.display = v === 'influencer' ? '' : 'none';
  document.getElementById('kbdHint').style.display = v === 'cards' ? '' : 'none';
  // Hide main-data filters, counter, and pagination when in community/influencer view
  var hideMain = v === 'community' || v === 'influencer';
  document.querySelectorAll('.toolbar select, .toolbar .search, .toolbar .count, .toolbar .primary, .toolbar .saving').forEach(function(el) {
    el.style.display = hideMain ? 'none' : '';
  });
  var batchBtn = document.querySelector('.toolbar button[onclick="openBatchBrowse()"]');
  if (batchBtn) batchBtn.style.display = hideMain ? 'none' : '';
  document.querySelectorAll('.pagination').forEach(function(el) {
    el.style.display = hideMain ? 'none' : '';
  });
  // Update URL hash for shareable link
  window.history.replaceState(null, '', v === 'cards' ? location.pathname : location.pathname + '#' + v);
  if (v === 'cards') renderCards();
  else if (v === 'community') loadCommunity();
  else if (v === 'influencer') loadInfluencer();
  else { focusedCardIdx = -1; }
}

async function loadCreators() {
  var resp = await fetch(API);
  allCreators = await resp.json();
  populateFilterOptions();
  applyFilters();
}

var FILTER_FIELDS = { fCommunity: 'community_paid', fCategory: 'category', fSelection: 'selection_status', fTier: 'tier', fReco: 'recommendation' };

// Tier ordering: lower index = cheaper CPM (better)
var TIER_ORDER = ['💰 <$1', '💰 $1-5', '🔶 $5-20', '⚠️ $20-100', '⚠️ >$20', '❌ >$100'];
function getTierLevel(tier) {
  var idx = TIER_ORDER.indexOf(tier);
  return idx >= 0 ? idx : 999;
}
function tierMatches(creatorTier, selectedTier) {
  if (!selectedTier) return true;
  return getTierLevel(creatorTier) <= getTierLevel(selectedTier);
}

function populateFilterOptions() {
  for (var selId in FILTER_FIELDS) {
    var sel = document.getElementById(selId);
    var field = FILTER_FIELDS[selId];
    var vals = {};
    allCreators.forEach(function(c) { if (c.rejected) return; var v = c[field]; if (v) vals[v] = (vals[v]||0) + 1; });

    if (selId === 'fTier') {
      // Sort by tier order, add "≤" prefix
      TIER_ORDER.forEach(function(t) {
        if (!vals[t]) return;
        var opt = document.createElement('option');
        opt.value = t;
        opt.textContent = '≤ ' + t + ' (' + vals[t] + ')';
        sel.appendChild(opt);
      });
      // Add TBD and any others not in TIER_ORDER
      Object.entries(vals).forEach(function(e) {
        if (TIER_ORDER.indexOf(e[0]) < 0) {
          var opt = document.createElement('option');
          opt.value = e[0];
          opt.textContent = e[0] + ' (' + e[1] + ')';
          sel.appendChild(opt);
        }
      });
    } else {
      Object.entries(vals).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(e) {
        var opt = document.createElement('option');
        opt.value = e[0];
        opt.textContent = e[0] + ' (' + e[1] + ')';
        sel.appendChild(opt);
      });
    }
  }
}

function getFilterValues() {
  return {
    q: document.querySelector('.search').value.toLowerCase(),
    fC: document.getElementById('fCommunity').value,
    fCat: document.getElementById('fCategory').value,
    fSel: document.getElementById('fSelection').value,
    fTier: document.getElementById('fTier').value,
    fReco: document.getElementById('fReco').value,
    fPicked: document.getElementById('fPicked').value
  };
}

function matchesFilters(c, fv, skipField) {
  if (c.rejected) return false;
  // When searching, ignore all other filters
  if (fv.q) {
    return (c.handle||'').toLowerCase().indexOf(fv.q) >= 0 || (c.name||'').toLowerCase().indexOf(fv.q) >= 0 || (c.bio||'').toLowerCase().indexOf(fv.q) >= 0;
  }
  if (skipField !== 'community_paid' && fv.fC && c.community_paid !== fv.fC) return false;
  if (skipField !== 'category' && fv.fCat && c.category !== fv.fCat) return false;
  if (skipField !== 'selection_status' && fv.fSel && c.selection_status !== fv.fSel) return false;
  if (skipField !== 'tier' && fv.fTier && !tierMatches(c.tier, fv.fTier)) return false;
  if (skipField !== 'recommendation' && fv.fReco && c.recommendation !== fv.fReco) return false;
  if (fv.fPicked === 'yes' && !c.picked) return false;
  if (fv.fPicked === 'no' && c.picked) return false;
  return true;
}

function updateFilterCounts(fv) {
  for (var selId in FILTER_FIELDS) {
    var field = FILTER_FIELDS[selId];
    var sel = document.getElementById(selId);
    // Count how many match for each option value (excluding this filter itself)
    var vals = {};
    allCreators.forEach(function(c) {
      if (!matchesFilters(c, fv, field)) return;
      var v = c[field];
      if (v) vals[v] = (vals[v]||0) + 1;
    });
    // Update option labels
    if (selId === 'fTier') {
      // For tier, show cumulative count (≤ this tier)
      for (var i = 1; i < sel.options.length; i++) {
        var optVal = sel.options[i].value;
        if (TIER_ORDER.indexOf(optVal) >= 0) {
          var cumCount = 0;
          TIER_ORDER.forEach(function(t) { if (getTierLevel(t) <= getTierLevel(optVal)) cumCount += (vals[t] || 0); });
          sel.options[i].textContent = '\u2264 ' + optVal + ' (' + cumCount + ')';
        } else {
          sel.options[i].textContent = optVal + ' (' + (vals[optVal] || 0) + ')';
        }
      }
    } else {
      for (var i = 1; i < sel.options.length; i++) {
        var optVal = sel.options[i].value;
        var count = vals[optVal] || 0;
        sel.options[i].textContent = optVal + ' (' + count + ')';
      }
    }
  }
}

function applyFilters() {
  var fv = getFilterValues();

  filtered = allCreators.filter(function(c) {
    return matchesFilters(c, fv, null);
  });

  updateFilterCounts(fv);

  if (sortCol) doSort();
  expandedIdx = -1;
  currentPage = 0;
  if (currentView === 'table') renderTable();
  else renderCards();
}

function doSort() {
  filtered.sort(function(a, b) {
    var va = a[sortCol], vb = b[sortCol];
    if (['ex1_views','ex1_likes','median_views','median_likes','top_post_likes'].indexOf(sortCol) >= 0) {
      va = parseNum(va); vb = parseNum(vb);
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function getCatClass(cat) {
  var c = (cat||'').toLowerCase();
  if (c.includes('developer') || c.includes('engineer')) return 'cat-dev';
  if (c.includes('crypto') || c.includes('web3')) return 'cat-crypto';
  if (c.includes('founder') || c.includes('entrepreneur')) return 'cat-founder';
  if (c.includes('video')) return 'cat-video';
  if (c.includes('cjk')) return 'cat-cjk';
  if (c.includes('educator') || c.includes('influencer')) return 'cat-educator';
  if (c.includes('news') || c.includes('commentary')) return 'cat-news';
  if (c.includes('lifestyle') || c.includes('creator economy')) return 'cat-lifestyle';
  if (c.includes('inactive') || c.includes('suspended')) return 'cat-inactive';
  return 'cat-tech';
}

function getBadgeClass(val) {
  var v = (val||'').toLowerCase();
  if (v === 'community') return 'badge-community';
  if (v === 'paid') return 'badge-paid';
  if (v === 'wait') return 'badge-wait';
  if (v === 'skip') return 'badge-skip';
  if (v.indexOf('meets') >= 0 && v.indexOf('not') < 0) return 'badge-meets';
  if (v.indexOf('not') >= 0) return 'badge-not-meets';
  return 'badge-wait';
}

// ===================== TABLE VIEW =====================
function renderHeaders() {
  var hr = document.getElementById('headerRow');
  hr.innerHTML = '';
  COLUMNS.forEach(function(col) {
    var th = document.createElement('th');
    th.textContent = col.label + (sortCol === col.key ? (sortAsc ? ' ↑' : ' ↓') : '');
    if (col.w) th.style.width = col.w + 'px';
    th.onclick = function() {
      if (sortCol === col.key) { sortAsc = !sortAsc; } else { sortCol = col.key; sortAsc = true; }
      doSort();
      renderHeaders();
      renderRows();
    };
    hr.appendChild(th);
  });
}

function renderRows() {
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  var start = currentPage * PAGE_SIZE;
  var pageData = filtered.slice(start, start + PAGE_SIZE);
  pageData.forEach(function(c, i) {
    var idx = start + i;
    var tr = document.createElement('tr');
    tr.className = 'data-row' + (c.picked ? ' picked-row' : '');
    tr.dataset.idx = idx;

    COLUMNS.forEach(function(col) {
      var td = document.createElement('td');
      if (col.type === 'check') {
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = c.picked;
        cb.onclick = function(e) { e.stopPropagation(); };
        cb.onchange = function() { togglePick(c, this.checked, tr); };
        td.appendChild(cb);
      } else if (col.type === 'link') {
        var handle = (c.handle||'').replace('@','');
        var a = document.createElement('a');
        a.href = 'https://x.com/' + handle;
        a.target = '_blank';
        a.textContent = c.handle;
        a.onclick = function(e) { e.stopPropagation(); };
        td.appendChild(a);
      } else if (col.type === 'badge' || col.type === 'badge2') {
        var span = document.createElement('span');
        span.className = 'badge ' + getBadgeClass(c[col.key]);
        span.textContent = c[col.key];
        td.appendChild(span);
      } else if (col.type === 'num') {
        td.className = 'num';
        td.textContent = c[col.key] || '';
      } else {
        td.textContent = c[col.key] || '';
        td.title = c[col.key] || '';
      }
      tr.appendChild(td);
    });

    // Click row to expand tweet embed
    tr.onclick = function() { toggleExpand(idx, tr); };
    tbody.appendChild(tr);
  });
  updateCounter();
  renderPagination('tableView');
}

// ===================== CARD VIEW =====================
var tweetObserver = null;
function renderCards() {
  var grid = document.getElementById('cardView');
  grid.innerHTML = '';
  if (tweetObserver) { tweetObserver.disconnect(); tweetObserver = null; }

  // Show keyboard hint in card view
  document.getElementById('kbdHint').style.display = currentView === 'cards' ? '' : 'none';

  var start = currentPage * PAGE_SIZE;
  var pageData = filtered.slice(start, start + PAGE_SIZE);
  var visibleCards = [];
  pageData.forEach(function(c, i) {
    visibleCards.push({ c: c, globalIdx: start + i });
  });

  visibleCards.forEach(function(item, cardPos) {
    var c = item.c;
    var globalIdx = item.globalIdx;
    var postUrl = c.top_post_url || c.ex1_url || '';
    var tweetId = getTweetId(postUrl);
    var handle = (c.handle||'').replace('@','');
    var card = document.createElement('div');
    card.className = 'card' + (c.picked ? ' picked' : '') + (cardPos === focusedCardIdx ? ' focused' : '');
    card.dataset.gIdx = globalIdx;
    card.dataset.cardPos = cardPos;

    card.innerHTML =
      '<div class="card-actions-top">' +
        '<button class="pick-btn' + (c.picked ? ' active' : '') + '" onclick="pickCard(' + globalIdx + ', this)">Pick</button>' +
        '<button class="reject-btn" onclick="rejectCard(' + globalIdx + ', this)">Reject</button>' +
      '</div>' +
      '<div class="card-header">' +
        '<div class="card-info">' +
          '<a class="handle-link" href="https://x.com/' + handle + '" target="_blank">' + c.handle + '</a>' +
          '<span style="color:#888;font-weight:400">' + (c.name||'') + '</span>' +
        '</div>' +
        '<div class="meta">' +
          '<span class="badge ' + getCatClass(c.category) + '">' + (c.category||'') + '</span>' +
          '<span>' + (c.max_pay ? '💰'+c.max_pay : '') + '</span>' +
          '<span class="badge ' + getBadgeClass(c.community_paid) + '">' + (c.community_paid||'') + '</span>' +
          (c.picked ? '<span class="picked-badge">PICKED</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="tweet-embed" id="card-tweet-' + globalIdx + '"' + (tweetId ? ' data-tweet-id="' + tweetId + '"' : '') + '>' +
        (tweetId ? '<div style="color:#666;padding:20px;text-align:center">Scroll to load tweet...</div>' : '<p class="no-post">No post URL</p>') +
      '</div>' +
      '<div class="card-footer">' +
        '<div class="stats">' +
          '<span>👁 ' + (c.ex1_views||'-') + '</span>' +
          '<span>❤️ ' + (c.ex1_likes||'-') + '</span>' +
          '<span>🔥 ' + (c.top_post_likes||'-') + '</span>' +
        '</div>' +
      '</div>';

    card.onclick = function(e) {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
      focusCard(cardPos);
    };
    grid.appendChild(card);
  });

  // Lazy load tweets with IntersectionObserver
  if (typeof twttr !== 'undefined' && twttr.widgets) {
    tweetObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          var tid = el.dataset.tweetId;
          if (tid && !el.dataset.loaded) {
            el.dataset.loaded = '1';
            el.innerHTML = '';
            twttr.widgets.createTweet(tid, el, { theme: 'dark', width: 500, conversation: 'none' });
          }
          tweetObserver.unobserve(el);
        }
      });
    }, { rootMargin: '200px' });
    grid.querySelectorAll('.tweet-embed[data-tweet-id]').forEach(function(el) {
      tweetObserver.observe(el);
    });
  }

  updateCounter();
  renderPagination('cardView');
}

function focusCard(pos) {
  var cards = document.querySelectorAll('#cardView .card');
  if (pos < 0 || pos >= cards.length) return;
  focusedCardIdx = pos;
  cards.forEach(function(c, i) { c.classList.toggle('focused', i === pos); });
  cards[pos].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function getVisibleCards() {
  return document.querySelectorAll('#cardView .card:not(.removing)');
}

window.pickCard = async function(i, btn) {
  var c = filtered[i];
  var newPicked = !c.picked;
  c.picked = newPicked;
  var card = btn.closest('.card');
  card.classList.toggle('picked', newPicked);
  btn.classList.toggle('active', newPicked);
  var meta = card.querySelector('.meta');
  var badge = meta.querySelector('.picked-badge');
  if (newPicked && !badge) {
    var s = document.createElement('span');
    s.className = 'picked-badge';
    s.textContent = 'PICKED';
    meta.appendChild(s);
  } else if (!newPicked && badge) { badge.remove(); }
  updateCounter();
  showSaving('Saving...');
  try {
    await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({handle:c.handle, picked:newPicked}) });
    showSaving('✅ Saved');
  } catch(e) { showSaving('❌ Failed'); }
};

window.rejectCard = async function(i, btn) {
  var c = filtered[i];
  c.picked = false;
  c.rejected = true;
  var card = btn.closest('.card');
  card.classList.add('removing');
  // After animation, remove the card and adjust focus
  setTimeout(function() {
    card.remove();
    var remaining = getVisibleCards();
    if (focusedCardIdx >= remaining.length) focusedCardIdx = remaining.length - 1;
    if (focusedCardIdx >= 0 && remaining.length > 0) focusCard(focusedCardIdx);
    updateCounter();
  }, 300);
  showSaving('Saving...');
  try {
    await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({handle:c.handle, picked:false, rejected:true}) });
    showSaving('✅ Rejected');
  } catch(e) { showSaving('❌ Failed'); }
};

function renderPagination(containerId) {
  var container = document.getElementById(containerId);
  // Remove existing pagination
  var existing = container.parentNode.querySelector('.pagination[data-for="' + containerId + '"]');
  if (existing) existing.remove();

  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) return;

  var div = document.createElement('div');
  div.className = 'pagination';
  div.dataset.for = containerId;

  var prevBtn = document.createElement('button');
  prevBtn.textContent = '← Prev';
  prevBtn.disabled = currentPage === 0;
  prevBtn.onclick = function() { currentPage--; if (currentView === 'table') renderTable(); else renderCards(); window.scrollTo(0,0); };

  var info = document.createElement('span');
  var start = currentPage * PAGE_SIZE + 1;
  var end = Math.min((currentPage + 1) * PAGE_SIZE, filtered.length);
  info.textContent = start + '-' + end + ' of ' + filtered.length + '  (Page ' + (currentPage+1) + '/' + totalPages + ')';

  var nextBtn = document.createElement('button');
  nextBtn.textContent = 'Next →';
  nextBtn.disabled = currentPage >= totalPages - 1;
  nextBtn.onclick = function() { currentPage++; if (currentView === 'table') renderTable(); else renderCards(); window.scrollTo(0,0); };

  div.appendChild(prevBtn);
  div.appendChild(info);
  div.appendChild(nextBtn);
  container.parentNode.insertBefore(div, container.nextSibling);
}

document.addEventListener('keydown', function(e) {
  if (currentView !== 'cards') return;
  // Ignore if user is typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  var cards = getVisibleCards();
  if (!cards.length) return;

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    var next = focusedCardIdx + 1;
    if (next < cards.length) focusCard(next);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    var prev = focusedCardIdx - 1;
    if (prev >= 0) focusCard(prev);
    else if (focusedCardIdx < 0) focusCard(0);
  } else if (e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    if (focusedCardIdx >= 0 && focusedCardIdx < cards.length) {
      var card = cards[focusedCardIdx];
      var pickBtn = card.querySelector('.pick-btn');
      if (pickBtn) pickBtn.click();
    }
  } else if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    if (focusedCardIdx >= 0 && focusedCardIdx < cards.length) {
      var card = cards[focusedCardIdx];
      var rejectBtn = card.querySelector('.reject-btn');
      if (rejectBtn) rejectBtn.click();
    }
  }
});

});

// Batch Browse functions
function openBatchBrowse() {
  document.getElementById('batchModal').classList.add('show');
  document.getElementById('batchInput').focus();
}
function closeBatchBrowse() {
  document.getElementById('batchModal').classList.remove('show');
}
function clearBatchTweets() {
  document.getElementById('batchInput').value = '';
  document.getElementById('batchTweets').innerHTML = '';
  document.getElementById('batchCount').textContent = '';
}
function extractTweetId(url) {
  var m = url.match(/status\/(\d+)/);
  return m ? m[1] : null;
}
function renderBatchTweets() {
  var input = document.getElementById('batchInput').value.trim();
  if (!input) return;
  var lines = input.split(/[\n,]+/).map(function(s) { return s.trim(); }).filter(Boolean);
  var tweetUrls = [];
  lines.forEach(function(line) {
    var id = extractTweetId(line);
    if (id) tweetUrls.push({ url: line, id: id });
  });
  if (tweetUrls.length === 0) {
    document.getElementById('batchCount').textContent = 'No valid tweet URLs found.';
    return;
  }
  document.getElementById('batchCount').textContent = tweetUrls.length + ' tweets loading...';
  var container = document.getElementById('batchTweets');
  container.innerHTML = '';
  tweetUrls.forEach(function(t) {
    var card = document.createElement('div');
    card.className = 'batch-tweet-card';
    card.id = 'batch-' + t.id;
    container.appendChild(card);
  });
  // Lazy load with IntersectionObserver
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        var tid = el.id.replace('batch-', '');
        observer.unobserve(el);
        if (window.twttr && twttr.widgets) {
          twttr.widgets.createTweet(tid, el, { theme: 'dark', width: 400 }).then(function() {
            // loaded
          });
        }
      }
    });
  }, { rootMargin: '200px' });
  tweetUrls.forEach(function(t) {
    var el = document.getElementById('batch-' + t.id);
    if (el) observer.observe(el);
  });
  var loaded = 0;
  var total = tweetUrls.length;
  var checkDone = setInterval(function() {
    var iframes = container.querySelectorAll('iframe');
    if (iframes.length >= total || loaded++ > 60) {
      document.getElementById('batchCount').textContent = total + ' tweets loaded.';
      clearInterval(checkDone);
    }
  }, 1000);
}
</script>
<script async src="https://platform.twitter.com/widgets.js"></script>
</body>
</html>
